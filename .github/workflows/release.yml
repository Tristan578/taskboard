name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Embed frontend in binary
        run: |
          mkdir -p cmd/kanban/web/dist
          cp -r web/dist/* cmd/kanban/web/dist/

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o "player2-kanban-${{ matrix.suffix }}${ext}" ./cmd/kanban

      - uses: actions/upload-artifact@v4
        with:
          name: player2-kanban-${{ matrix.suffix }}
          path: player2-kanban-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/player2-kanban-*; do
            suffix=$(basename "$dir" | sed 's/^player2-kanban-//')
            if echo "$suffix" | grep -q "windows"; then
              # Windows: create .zip with the .exe
              cp "$dir/player2-kanban-${suffix}.exe" "release/player2-kanban.exe"
              cd release && zip "player2-kanban-${suffix}.zip" "player2-kanban.exe" && rm "player2-kanban.exe" && cd ..
            else
              # Unix: create .tar.gz
              cp "$dir/player2-kanban-${suffix}" "release/player2-kanban"
              chmod +x "release/player2-kanban"
              cd release && tar czf "player2-kanban-${suffix}.tar.gz" "player2-kanban" && rm "player2-kanban" && cd ..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
