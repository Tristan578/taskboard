name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Embed frontend
        run: |
          mkdir -p cmd/kanban/web/dist
          cp -r web/dist/* cmd/kanban/web/dist/

      - name: Build binary
        run: go build -o player2-kanban ./cmd/kanban

      - name: Verify binary
        run: ./player2-kanban --help

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

      - name: Run security scanner (gosec)
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run Go tests with coverage
        run: |
          go test -coverprofile=coverage.txt -covermode=atomic ./...
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Current coverage: $COVERAGE%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov < 80) { print "Coverage is " cov "%, which is below the target 80%."; exit 1 } }'

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint and Typecheck
        working-directory: web
        run: npm run lint && npm run build
